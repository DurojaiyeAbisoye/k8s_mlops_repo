apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-registry
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/DurojaiyeAbisoye/k8s_mlops_repo.git
    targetRevision: main
    path: applications/hub/overlays/model-registry
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow-user-example-com
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
