apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tensorboards-web-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://github.com/DurojaiyeAbisoye/k8s_mlops_repo.git
    targetRevision: master
    path: applications/notebooks-v1/upstream/tensorboards-web-app/overlays/istio
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
