apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-csi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/DurojaiyeAbisoye/k8s_mlops_repo
    targetRevision: main
    path: applications/hub/upstream/options/csi
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
