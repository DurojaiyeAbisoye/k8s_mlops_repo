apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../oauth2-proxy
patches:
- target:
    kind: DaemonSet
    name: istio-cni-node
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: CONTAINER_RUNTIME_ENDPOINT
        value: unix:///run/k3s/containerd/containerd.sock
